<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations for {{ title }}</title>
    <link href="{{url_for('static', filename='styles/style.css')}}" rel="stylesheet" />
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="hero">
                <span class="eyebrow">Recommendations</span>
                <h1>Movies similar to {{ title }}</h1>
                <p class="subtitle">Top ranked movies similar to your selection.</p>
            </div>

            <div class="table-wrap">
                {{ recommendations | safe }}
            </div>

            <form class="search-form" action="/movie" method="get">
                <input type="text" name="movie" id="movie" placeholder="Enter a movie" />
                <button type="submit">Search again</button>
            </form>
        </section>
    </main>
</body>
</html>
